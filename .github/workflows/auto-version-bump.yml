name: Auto Version Bump

on:
    pull_request:
        types: [closed]
        branches:
            - master

concurrency:
    group: release
    cancel-in-progress: false

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    bump:
        if: |
            github.event.pull_request.merged == true &&
            (
              contains(github.event.pull_request.labels.*.name, 'bump:patch') ||
              contains(github.event.pull_request.labels.*.name, 'bump:minor') ||
              contains(github.event.pull_request.labels.*.name, 'bump:major')
            )
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            sha: ${{ steps.sha.outputs.sha }}

        steps:
            - uses: actions/checkout@v5
              with:
                  ref: master
                  fetch-depth: 0

            - name: Use Node.js 22.x
              uses: actions/setup-node@v5
              with:
                  node-version: 22.x
                  cache: "npm"

            - run: npm ci

            - name: Determine bump type
              id: bump_type
              env:
                  IS_MAJOR: ${{ contains(github.event.pull_request.labels.*.name, 'bump:major') }}
                  IS_MINOR: ${{ contains(github.event.pull_request.labels.*.name, 'bump:minor') }}
              run: |
                  if [ "$IS_MAJOR" = "true" ]; then
                    echo "type=major" >> $GITHUB_OUTPUT
                  elif [ "$IS_MINOR" = "true" ]; then
                    echo "type=minor" >> $GITHUB_OUTPUT
                  else
                    echo "type=patch" >> $GITHUB_OUTPUT
                  fi

            - name: Bump version files
              run: npm version ${{ steps.bump_type.outputs.type }} --no-git-tag-version

            - name: Validate build passes with new version
              run: npm run build && npm run lint && npm test

            - name: Get new version
              id: version
              run: echo "version=$(jq -r .version manifest.json)" >> $GITHUB_OUTPUT

            - name: Commit and push version bump
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add manifest.json versions.json package.json package-lock.json
                  git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
                  git push origin master

            - name: Capture bump commit SHA
              id: sha
              run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    release:
        needs: bump
        uses: ./.github/workflows/_build-release.yml
        with:
            version: ${{ needs.bump.outputs.version }}
            sha: ${{ needs.bump.outputs.sha }}
        permissions:
            contents: write
            id-token: write
            attestations: write
