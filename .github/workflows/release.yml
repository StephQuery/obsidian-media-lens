name: Release

on:
    push:
        branches:
            - master

concurrency:
    group: release
    cancel-in-progress: false

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    check:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            exists: ${{ steps.tag_check.outputs.exists }}

        steps:
            - uses: actions/checkout@v5

            - name: Get version from manifest
              id: version
              run: echo "version=$(jq -r .version manifest.json)" >> $GITHUB_OUTPUT

            - name: Check if tag already exists
              id: tag_check
              run: |
                  if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                  fi

    release:
        needs: check
        if: needs.check.outputs.exists == 'false'
        uses: ./.github/workflows/_build-release.yml
        with:
            version: ${{ needs.check.outputs.version }}
        permissions:
            contents: write
            id-token: write
            attestations: write
