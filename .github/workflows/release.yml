name: Release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v5

            - name: Use Node.js 22.x
              uses: actions/setup-node@v5
              with:
                  node-version: 22.x
                  cache: "npm"

            - run: npm ci
            - run: npm run build
            - run: npm run lint
            - run: npm test

            - name: Verify build artifacts
              run: |
                  test -f main.js
                  test -f manifest.json
                  test -f styles.css
                  test -f MediaInfoModule.wasm

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      main.js
                      manifest.json
                      styles.css
                      MediaInfoModule.wasm
